import React, { useMemo, useState } from "react";
import { motion, AnimatePresence } from "framer-motion";
import { Search, ChevronLeft, ChevronRight, MousePointer2, Palette, FileImage, Video, BookOpen, Handshake, MessageCircle, Sparkles, ShoppingBag, Clock, CheckCircle2, Star, Send, Menu, X } from "lucide-react";
import { Button } from "@/components/ui/button";
import { Card, CardContent } from "@/components/ui/card";

const navItems = ["网站首页", "期刊封面", "摘要图TOC", "论文配图", "科研动画", "合作流程", "服务范围", "关于我们", "联系我们", "推广充值"];

const slides = [
  {
    title: "省心科研绘图",
    subtitle: "让复杂科研结果，一眼看懂",
    tag: "5年专注科研视觉表达",
    cta: "查看服务",
    gradient: "from-slate-950 via-cyan-950 to-blue-950",
  },
  {
    title: "期刊封面设计",
    subtitle: "Nature / Science / Cell 风格科研封面定制",
    tag: "高端封面 · 概念视觉 · 投稿加分",
    cta: "预约设计",
    gradient: "from-indigo-950 via-slate-900 to-teal-950",
  },
  {
    title: "论文图形摘要",
    subtitle: "TOC、机制图、技术路线图、流程图一站式优化",
    tag: "SCI论文配图 · 逻辑清晰 · 版式专业",
    cta: "上传需求",
    gradient: "from-slate-950 via-purple-950 to-cyan-950",
  },
];

const services = [
  { icon: FileImage, title: "期刊封面", desc: "根据论文创新点、材料结构、实验结果设计高冲击力封面图。", price: "¥399起" },
  { icon: BookOpen, title: "摘要图TOC", desc: "将研究思路、反应路径、器件结构、机制模型转化为清晰图形摘要。", price: "¥199起" },
  { icon: Palette, title: "论文配图美化", desc: "柱状图、折线图、机制图、示意图、流程图统一风格排版。", price: "¥99起" },
  { icon: Video, title: "科研动画", desc: "材料合成、药物递送、分子机制、器件工作原理动态展示。", price: "¥699起" },
];

const cases = [
  { name: "纳米材料催化机制图", field: "材料 / 化学", type: "机制示意图", level: "SCI投稿级" },
  { name: "肿瘤靶向递送TOC", field: "生物医学", type: "图形摘要", level: "高端定制" },
  { name: "柔性传感器期刊封面", field: "电子 / 器件", type: "期刊封面", level: "概念视觉" },
  { name: "能源储存工作原理动画", field: "能源 / 电化学", type: "科研动画", level: "可视化演示" },
  { name: "光电传感系统架构图", field: "传感 / 仪器", type: "论文配图", level: "论文级排版" },
  { name: "机器学习科研流程图", field: "AI / 交叉学科", type: "流程图", level: "逻辑优化" },
];

const process = [
  "提交论文摘要、草图或实验思路",
  "设计师梳理科学逻辑与视觉方向",
  "确认风格、报价与交付时间",
  "制作初稿并在线预览修改",
  "交付高清源文件与投稿尺寸版本",
];

const faqs = [
  { q: "没有草图可以做吗？", a: "可以。只需提供论文摘要、实验结果、关键机制或参考图片，我们会先帮你梳理画面逻辑。" },
  { q: "可以按目标期刊风格设计吗？", a: "可以。可参考 Nature、Science、Cell、ACS、Elsevier、Wiley 等常见期刊视觉风格。" },
  { q: "交付什么文件？", a: "常规交付高清PNG/JPG，也可按需求交付AI、PSD、PPT、PDF等源文件或可编辑版本。" },
];

function HeroGraphic() {
  return (
    <div className="relative mx-auto h-[310px] max-w-[760px] overflow-hidden rounded-[2rem] border border-cyan-300/30 bg-cyan-300/10 shadow-2xl shadow-cyan-500/20 backdrop-blur">
      <div className="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,.06)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,.06)_1px,transparent_1px)] bg-[size:26px_26px]" />
      <motion.div animate={{ x: [0, 18, 0], y: [0, -10, 0] }} transition={{ duration: 6, repeat: Infinity }} className="absolute left-8 top-10 h-28 w-28 rounded-full bg-cyan-300/20 blur-xl" />
      <motion.div animate={{ x: [0, -18, 0], y: [0, 12, 0] }} transition={{ duration: 7, repeat: Infinity }} className="absolute bottom-8 right-10 h-36 w-36 rounded-full bg-blue-300/20 blur-xl" />
      <div className="absolute left-7 top-7 h-14 w-14 rounded-full border border-white/30 bg-white/10" />
      <div className="absolute left-20 top-24 h-8 w-8 rounded-full border border-white/30 bg-white/10" />
      <div className="absolute right-16 top-12 h-10 w-10 rounded-full border border-cyan-200/40 bg-cyan-100/10" />
      <div className="absolute right-20 bottom-16 h-24 w-12 rounded-b-full rounded-t-lg border border-cyan-200/40 bg-cyan-200/10">
        <div className="absolute bottom-0 h-12 w-full rounded-b-full bg-cyan-300/30" />
      </div>
      <div className="absolute inset-x-12 top-20 rounded-2xl border border-cyan-200/60 bg-slate-950/30 p-8 text-center shadow-inner">
        <p className="text-4xl font-bold tracking-[0.2em] text-white drop-shadow">省心科研绘图</p>
        <p className="mt-5 text-2xl font-semibold text-yellow-300">5 年专注科研视觉品牌</p>
        <Button className="mt-6 border border-white/50 bg-white/10 text-white hover:bg-white/20">了解更多</Button>
      </div>
    </div>
  );
}

export default function App() {
  const [activeSlide, setActiveSlide] = useState(0);
  const [query, setQuery] = useState("");
  const [category, setCategory] = useState("全部");
  const [selectedCase, setSelectedCase] = useState(cases[0]);
  const [openFaq, setOpenFaq] = useState(0);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [form, setForm] = useState({ name: "", field: "", need: "" });
  const [submitted, setSubmitted] = useState(false);

  const filteredCases = useMemo(() => {
    return cases.filter((item) => {
      const matchQuery = [item.name, item.field, item.type].join(" ").includes(query);
      const matchCategory = category === "全部" || item.type.includes(category) || item.field.includes(category);
      return matchQuery && matchCategory;
    });
  }, [query, category]);

  const nextSlide = () => setActiveSlide((v) => (v + 1) % slides.length);
  const prevSlide = () => setActiveSlide((v) => (v - 1 + slides.length) % slides.length);

  const submit = (e) => {
    e.preventDefault();
    setSubmitted(true);
    setTimeout(() => setSubmitted(false), 2600);
  };

  return (
    <div className="min-h-screen bg-slate-950 text-white">
      <header className="fixed left-0 right-0 top-0 z-50 border-b border-white/10 bg-slate-950/70 backdrop-blur-xl">
        <div className="mx-auto flex max-w-7xl items-center justify-between px-5 py-4">
          <div className="flex items-center gap-3">
            <div className="flex h-12 w-12 items-center justify-center rounded-full border border-cyan-200/60 bg-cyan-300/10">
              <Sparkles className="h-6 w-6 text-cyan-200" />
            </div>
            <div>
              <p className="text-xl font-bold tracking-wide">省心科研绘图</p>
              <p className="text-xs text-cyan-100/70">Scientific Illustration Studio</p>
            </div>
          </div>
          <nav className="hidden items-center gap-6 text-sm text-white/85 lg:flex">
            {navItems.slice(0, 8).map((item) => <a key={item} href={`#${item}`} className="transition hover:text-cyan-200">{item}</a>)}
          </nav>
          <div className="hidden items-center gap-2 md:flex">
            <div className="flex items-center rounded-xl border border-white/10 bg-white/10 px-3 py-2">
              <input className="w-36 bg-transparent text-sm outline-none placeholder:text-white/45" placeholder="搜索服务..." value={query} onChange={(e) => setQuery(e.target.value)} />
              <Search className="h-4 w-4 text-white/70" />
            </div>
            <Button className="bg-cyan-400 text-slate-950 hover:bg-cyan-300">淘宝咨询</Button>
          </div>
          <button className="lg:hidden" onClick={() => setMobileOpen(!mobileOpen)}>{mobileOpen ? <X /> : <Menu />}</button>
        </div>
        {mobileOpen && <div className="grid gap-3 border-t border-white/10 px-5 py-4 lg:hidden">{navItems.slice(0, 8).map((item) => <a key={item} href={`#${item}`} className="text-white/80" onClick={() => setMobileOpen(false)}>{item}</a>)}</div>}
      </header>

      <section id="网站首页" className={`relative overflow-hidden bg-gradient-to-br ${slides[activeSlide].gradient} pt-28`}>
        <div className="absolute inset-0 opacity-30 [background:radial-gradient(circle_at_20%_30%,#67e8f9_0,transparent_28%),radial-gradient(circle_at_80%_20%,#a78bfa_0,transparent_24%),radial-gradient(circle_at_50%_90%,#22d3ee_0,transparent_30%)]" />
        <div className="relative mx-auto grid max-w-7xl items-center gap-10 px-5 py-16 lg:grid-cols-[0.9fr_1.1fr]">
          <AnimatePresence mode="wait">
            <motion.div key={activeSlide} initial={{ opacity: 0, y: 18 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -18 }} transition={{ duration: 0.35 }}>
              <div className="mb-5 inline-flex items-center gap-2 rounded-full border border-cyan-200/40 bg-white/10 px-4 py-2 text-sm text-cyan-100">
                <Star className="h-4 w-4" /> {slides[activeSlide].tag}
              </div>
              <h1 className="text-5xl font-black leading-tight md:text-7xl">{slides[activeSlide].title}</h1>
              <p className="mt-6 max-w-xl text-xl leading-9 text-white/80">{slides[activeSlide].subtitle}</p>
              <div className="mt-8 flex flex-wrap gap-4">
                <Button size="lg" className="bg-cyan-300 text-slate-950 hover:bg-cyan-200"><ShoppingBag className="mr-2 h-5 w-5" />{slides[activeSlide].cta}</Button>
                <Button size="lg" variant="outline" className="border-white/40 bg-white/10 text-white hover:bg-white/20"><MousePointer2 className="mr-2 h-5 w-5" />在线估价</Button>
              </div>
            </motion.div>
          </AnimatePresence>
          <HeroGraphic />
        </div>
        <button onClick={prevSlide} className="absolute left-5 top-1/2 rounded-full bg-white/10 p-3 backdrop-blur transition hover:bg-white/20"><ChevronLeft /></button>
        <button onClick={nextSlide} className="absolute right-5 top-1/2 rounded-full bg-white/10 p-3 backdrop-blur transition hover:bg-white/20"><ChevronRight /></button>
      </section>

      <section id="服务范围" className="mx-auto max-w-7xl px-5 py-20">
        <div className="mb-10 flex flex-col justify-between gap-5 md:flex-row md:items-end">
          <div>
            <p className="text-cyan-300">SERVICE SCOPE</p>
            <h2 className="mt-2 text-4xl font-bold">店铺核心服务</h2>
            <p className="mt-3 text-white/60">适合淘宝店铺首页、服务页、产品详情页展示。</p>
          </div>
          <div className="flex flex-wrap gap-2">
            {["全部", "封面", "图形摘要", "动画", "材料", "生物"].map((item) => <Button key={item} variant={category === item ? "default" : "outline"} className={category === item ? "bg-cyan-300 text-slate-950" : "border-white/20 bg-white/5 text-white"} onClick={() => setCategory(item)}>{item}</Button>)}
          </div>
        </div>
        <div className="grid gap-5 md:grid-cols-2 lg:grid-cols-4">
          {services.map((service) => <Card key={service.title} className="border-white/10 bg-white/[0.06] text-white backdrop-blur transition hover:-translate-y-1 hover:bg-white/[0.09]">
            <CardContent className="p-6">
              <service.icon className="h-10 w-10 text-cyan-300" />
              <h3 className="mt-5 text-xl font-bold">{service.title}</h3>
              <p className="mt-3 min-h-[72px] text-sm leading-7 text-white/65">{service.desc}</p>
              <div className="mt-5 flex items-center justify-between">
                <span className="text-lg font-bold text-yellow-300">{service.price}</span>
                <Button size="sm" className="bg-white/10 text-white hover:bg-cyan-300 hover:text-slate-950">咨询</Button>
              </div>
            </CardContent>
          </Card>)}
        </div>
      </section>

      <section id="论文配图" className="bg-white/[0.04] py-20">
        <div className="mx-auto max-w-7xl px-5">
          <div className="mb-10 grid gap-6 md:grid-cols-[0.8fr_1.2fr] md:items-end">
            <div>
              <p className="text-cyan-300">PORTFOLIO FILTER</p>
              <h2 className="mt-2 text-4xl font-bold">交互式案例筛选</h2>
            </div>
            <div className="flex items-center rounded-2xl border border-white/10 bg-slate-950/70 px-4 py-3">
              <Search className="mr-3 h-5 w-5 text-white/60" />
              <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="输入：材料、生物、封面、动画、TOC..." className="w-full bg-transparent outline-none placeholder:text-white/40" />
            </div>
          </div>
          <div className="grid gap-6 lg:grid-cols-[1fr_0.9fr]">
            <div className="grid gap-4 md:grid-cols-2">
              {filteredCases.map((item) => <button key={item.name} onClick={() => setSelectedCase(item)} className={`rounded-2xl border p-5 text-left transition ${selectedCase.name === item.name ? "border-cyan-300 bg-cyan-300/10" : "border-white/10 bg-white/[0.05] hover:border-white/30"}`}>
                <p className="text-lg font-bold">{item.name}</p>
                <p className="mt-2 text-sm text-white/60">{item.field} · {item.type}</p>
                <span className="mt-4 inline-flex rounded-full bg-white/10 px-3 py-1 text-xs text-cyan-200">{item.level}</span>
              </button>)}
            </div>
            <div className="rounded-[2rem] border border-cyan-300/20 bg-gradient-to-br from-cyan-300/10 to-blue-500/10 p-7 shadow-2xl shadow-cyan-500/10">
              <div className="flex h-72 items-center justify-center rounded-3xl border border-white/10 bg-slate-950/50">
                <div className="text-center">
                  <Sparkles className="mx-auto h-14 w-14 text-cyan-300" />
                  <p className="mt-5 text-2xl font-bold">{selectedCase.name}</p>
                  <p className="mt-2 text-white/60">{selectedCase.field}</p>
                </div>
              </div>
              <div className="mt-6 grid grid-cols-3 gap-3 text-center">
                <div className="rounded-2xl bg-white/5 p-4"><p className="text-xs text-white/50">类型</p><p className="mt-1 font-semibold">{selectedCase.type}</p></div>
                <div className="rounded-2xl bg-white/5 p-4"><p className="text-xs text-white/50">等级</p><p className="mt-1 font-semibold">{selectedCase.level}</p></div>
                <div className="rounded-2xl bg-white/5 p-4"><p className="text-xs text-white/50">交付</p><p className="mt-1 font-semibold">高清源文件</p></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="合作流程" className="mx-auto max-w-7xl px-5 py-20">
        <p className="text-cyan-300">WORKFLOW</p>
        <h2 className="mt-2 text-4xl font-bold">合作流程</h2>
        <div className="mt-10 grid gap-4 md:grid-cols-5">
          {process.map((step, index) => <motion.div key={step} whileHover={{ y: -6 }} className="rounded-2xl border border-white/10 bg-white/[0.06] p-5">
            <div className="flex h-11 w-11 items-center justify-center rounded-full bg-cyan-300 text-lg font-black text-slate-950">{index + 1}</div>
            <p className="mt-5 text-sm leading-7 text-white/75">{step}</p>
          </motion.div>)}
        </div>
      </section>

      <section id="联系我们" className="bg-white/[0.04] py-20">
        <div className="mx-auto grid max-w-7xl gap-8 px-5 lg:grid-cols-[0.9fr_1.1fr]">
          <div>
            <p className="text-cyan-300">CONTACT</p>
            <h2 className="mt-2 text-4xl font-bold">在线提交需求</h2>
            <p className="mt-5 leading-8 text-white/65">用户可填写研究方向、图片类型、交付时间和参考风格。表单提交后可对接淘宝客服、企业微信、邮箱或后台订单系统。</p>
            <div className="mt-8 grid gap-4">
              <div className="flex items-center gap-3 text-white/80"><MessageCircle className="text-cyan-300" /> 淘宝店铺：省心科研绘图</div>
              <div className="flex items-center gap-3 text-white/80"><Clock className="text-cyan-300" /> 常规初稿：1-3个工作日</div>
              <div className="flex items-center gap-3 text-white/80"><Handshake className="text-cyan-300" /> 支持长期课题组合作</div>
            </div>
          </div>
          <form onSubmit={submit} className="rounded-[2rem] border border-white/10 bg-slate-950/70 p-6 shadow-xl">
            <div className="grid gap-4 md:grid-cols-2">
              <input required placeholder="姓名 / 昵称" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 outline-none focus:border-cyan-300" />
              <input required placeholder="研究方向，如材料/医学/能源" value={form.field} onChange={(e) => setForm({ ...form, field: e.target.value })} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 outline-none focus:border-cyan-300" />
            </div>
            <textarea required rows={6} placeholder="请描述需求：期刊封面 / TOC / 机制图 / 动画 / 美化已有图片..." value={form.need} onChange={(e) => setForm({ ...form, need: e.target.value })} className="mt-4 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 outline-none focus:border-cyan-300" />
            <Button type="submit" size="lg" className="mt-4 w-full bg-cyan-300 text-slate-950 hover:bg-cyan-200"><Send className="mr-2 h-5 w-5" />提交需求</Button>
            {submitted && <div className="mt-4 flex items-center gap-2 rounded-2xl bg-emerald-400/10 px-4 py-3 text-emerald-200"><CheckCircle2 className="h-5 w-5" />已收到需求，客服将尽快与你确认报价与工期。</div>}
          </form>
        </div>
      </section>

      <section id="关于我们" className="mx-auto max-w-5xl px-5 py-20">
        <p className="text-center text-cyan-300">FAQ</p>
        <h2 className="mt-2 text-center text-4xl font-bold">常见问题</h2>
        <div className="mt-10 grid gap-4">
          {faqs.map((item, index) => <div key={item.q} className="rounded-2xl border border-white/10 bg-white/[0.05]">
            <button onClick={() => setOpenFaq(openFaq === index ? -1 : index)} className="flex w-full items-center justify-between p-5 text-left font-bold">
              {item.q}<span className="text-cyan-300">{openFaq === index ? "−" : "+"}</span>
            </button>
            {openFaq === index && <p className="px-5 pb-5 leading-8 text-white/65">{item.a}</p>}
          </div>)}
        </div>
      </section>

      <footer className="border-t border-white/10 bg-slate-950 px-5 py-10 text-center text-white/50">
        <p className="text-lg font-bold text-white">省心科研绘图</p>
        <p className="mt-2">科研配图 · 期刊封面 · 图形摘要 · 科研动画 · 论文图表美化</p>
      </footer>
    </div>
  );
}
